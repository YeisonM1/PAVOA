<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primarios ── -->
    <title>PAVOA | Tienda Deportiva Online</title>
    <meta name="description" content="Encuentra ropa, calzado y accesorios deportivos de alta calidad. Running, fútbol, gym y más. Envíos a toda Colombia." />
    <link rel="canonical" href="https://pavoa.vercel.app/" />

    <!-- ── ✅ NUEVO: Preconnect a servicios externos (reduce latencia) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://jkyindmesdnptuvmetfv.supabase.co" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://jkyindmesdnptuvmetfv.supabase.co" />

    <!-- ── ✅ NUEVO: Preload imagen hero (mejora LCP directamente) ── -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=1400&q=70&fm=webp&auto=format"
      fetchpriority="high"
    />

    <!-- ── Fuentes: precarga no bloqueante ── -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pavoa.vercel.app/" />
    <meta property="og:title" content="PAVOA | Tienda Deportiva Online" />
    <meta property="og:description" content="Ropa, calzado y accesorios deportivos de alta calidad. Envíos a toda Colombia." />
    <meta property="og:image" content="https://pavoa.vercel.app/og-image.jpg" />
    <meta property="og:locale" content="es_CO" />
    <meta property="og:site_name" content="PAVOA" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PAVOA | Tienda Deportiva Online" />
    <meta name="twitter:description" content="Ropa, calzado y accesorios deportivos de alta calidad. Envíos a toda Colombia." />
    <meta name="twitter:image" content="https://pavoa.vercel.app/og-image.jpg" />

    <!-- ── ✅ NUEVO: Tema del navegador (color de la barra en móvil) ── -->
    <meta name="theme-color" content="#F2E4E1" />

    <!-- ── Schema.org ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "PAVOA",
      "url": "https://pavoa.vercel.app",
      "description": "Tienda deportiva online con ropa, calzado y accesorios.",
      "image": "https://pavoa.vercel.app/og-image.jpg",
      "priceRange": "$$",
      "currenciesAccepted": "COP",
      "areaServed": "CO"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
